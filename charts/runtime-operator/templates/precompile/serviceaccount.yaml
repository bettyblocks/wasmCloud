{{- if and .Values.precompile.enabled .Values.precompile.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "precompile.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    wasmcloud.com/name: precompile-worker
    {{- include "runtime-operator.labels" . | nindent 4 }}
  {{- with .Values.precompile.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
