{{- if and .Values.nats.enabled .Values.nats.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-data
  namespace: {{ .Release.Namespace }}
  labels:
    wasmcloud.com/name: nats
    {{- include "runtime-operator.labels" . | nindent 4 }}
  {{- with .Values.nats.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.nats.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.nats.persistence.size | quote }}
  {{- if .Values.nats.persistence.storageClass }}
  storageClassName: {{ .Values.nats.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
