build:
  command: bash build.sh
  component_path: components/target/demo/frontend.wasm

dev:
  # All guests are P3 (component-model async) components.
  wasip3: true
  # Pinned service owning the client-facing SSE connections.
  service_file: components/target/demo/sse-service.wasm
  components:
    # Counter component; its async runner export is called CONCURRENTLY by
    # the frontend through the runtime's linked-call trampoline.
    - name: counter
      file: components/target/demo/counter.wasm
  # Declare the plugin-backed interface explicitly: wash dev merges
  # auto-extracted interfaces by namespace+package, and a component only
  # matches an entry whose interface set its world fully covers.
  # demo:jobs/runner needs no entry — it is wired component-to-component by
  # the workload linker.
  host_interfaces:
    - namespace: demo
      package: jobs
      interfaces: [control]
      version: 0.1.0
      config: {}
      name: null
