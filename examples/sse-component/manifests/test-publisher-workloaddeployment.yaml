apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: test-publisher
spec:
  replicas: 1
  template:
    spec:
      hostSelector:
        hostgroup: default
      components:
        - name: test-publisher
          image: wasmcloud-registry:5000/test-publisher:0.1.0
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: test-publisher
        - namespace: wasmcloud
          package: messaging
          interfaces:
            - consumer
          config: {}
